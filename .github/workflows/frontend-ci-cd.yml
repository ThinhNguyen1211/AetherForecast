name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - packages/frontend/**
      - package-lock.json
      - .github/workflows/frontend-ci-cd.yml
      - .github/workflows/reusable-deploy-frontend.yml
      - .github/workflows/reusable-security-scan.yml
  pull_request:
    branches: [main, develop]
    paths:
      - packages/frontend/**
      - package-lock.json
      - .github/workflows/frontend-ci-cd.yml
      - .github/workflows/reusable-deploy-frontend.yml
      - .github/workflows/reusable-security-scan.yml

permissions:
  contents: read

concurrency:
  group: frontend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-safety:
    name: Repository Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block tracked .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.|/)'; then
            echo "Tracked .env file detected. Remove it and use GitHub/AWS secrets management."
            exit 1
          fi

      - name: Block obvious AWS key patterns
        run: |
          if git grep -nE 'AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}' -- .; then
            echo "Potential AWS access key detected in repository files."
            exit 1
          fi

  frontend-verify:
    name: TS Lint Format (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: repository-safety
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit -p packages/frontend/tsconfig.json

      - name: ESLint (warning-only)
        continue-on-error: true
        run: |
          npm exec --yes \
            --package=eslint@9 \
            --package=@typescript-eslint/parser@8 \
            --package=@typescript-eslint/eslint-plugin@8 \
            -- eslint "packages/frontend/src/**/*.{ts,tsx}" \
              --parser @typescript-eslint/parser \
              --plugin @typescript-eslint \
              --rule "@typescript-eslint/no-unused-vars:error" \
              --max-warnings=0 \
              --no-error-on-unmatched-pattern

      - name: Prettier check (warning-only)
        continue-on-error: true
        run: |
          npx --yes prettier@3 --check \
            "packages/frontend/src/**/*.{ts,tsx,css}" \
            "packages/frontend/index.html"

  frontend-build:
    name: Build Frontend Artifact
    runs-on: ubuntu-latest
    needs: frontend-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_COGNITO_REGION: ap-southeast-1
          VITE_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_APP_CLIENT_ID }}
        run: npm --workspace @aetherforecast/frontend run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist
          if-no-files-found: error
          retention-days: 7

  frontend-summary:
    name: Frontend CI Summary
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Summary
        run: echo "Frontend CI completed successfully."
