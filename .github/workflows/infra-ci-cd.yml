name: Infra CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - packages/infra/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/infra-ci-cd.yml
      - .github/workflows/reusable-security-scan.yml
  pull_request:
    branches: [main, develop]
    paths:
      - packages/infra/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/infra-ci-cd.yml
      - .github/workflows/reusable-security-scan.yml

permissions:
  contents: read

concurrency:
  group: infra-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Repository Secret And Config Scan
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      scan-path: .

  cdk-synth:
    name: CDK Synth (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    defaults:
      run:
        working-directory: packages/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --workspaces --include-workspace-root

      - name: Build infra
        run: npm run build

      - name: CDK synth
        env:
          CDK_DISABLE_VERSION_CHECK: '1'
        run: npm run synth

  cdk-diff:
    name: CDK Diff (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: cdk-synth
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: packages/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --workspaces --include-workspace-root

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: CDK diff
        env:
          CDK_DISABLE_VERSION_CHECK: '1'
        run: npm run diff

  approval-gate:
    name: Manual Approval Gate (Main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: cdk-synth
    steps:
      - name: Await production approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ vars.PROD_APPROVERS || github.actor }}
          minimum-approvals: 1
          issue-title: "Approve production CDK deployment"
          issue-body: "Approve or deny production deployment for commit ${{ github.sha }}"

  cdk-deploy-prod:
    name: CDK Deploy Prod (Main With Approval Gate)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: approval-gate
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --workspaces --include-workspace-root

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: CDK deploy
        env:
          CDK_DISABLE_VERSION_CHECK: '1'
        run: |
          cdk deploy AetherForecastStack --require-approval never
