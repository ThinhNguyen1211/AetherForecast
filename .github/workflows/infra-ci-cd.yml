name: Infra CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - packages/infra/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/infra-ci-cd.yml
      - .github/workflows/reusable-security-scan.yml
  pull_request:
    branches: [main, develop]
    paths:
      - packages/infra/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/infra-ci-cd.yml
      - .github/workflows/reusable-security-scan.yml

permissions:
  contents: read

concurrency:
  group: infra-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-safety:
    name: Repository Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block tracked .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.|/)'; then
            echo "Tracked .env file detected. Remove it and use GitHub/AWS secrets management."
            exit 1
          fi

      - name: Block obvious AWS key patterns
        run: |
          if git grep -nE 'AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}' -- .; then
            echo "Potential AWS access key detected in repository files."
            exit 1
          fi

  cdk-synth:
    name: CDK Synth (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: repository-safety
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    defaults:
      run:
        working-directory: packages/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --workspaces --include-workspace-root

      - name: Build infra
        run: npm run build

      - name: CDK synth
        env:
          CDK_DISABLE_VERSION_CHECK: '1'
        run: npm run synth

  infra-summary:
    name: Infra CI Summary
    runs-on: ubuntu-latest
    needs: cdk-synth
    steps:
      - name: Summary
        run: echo "Infra CI completed successfully."
