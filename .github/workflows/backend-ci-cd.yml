name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - packages/backend/**
      - .github/workflows/backend-ci-cd.yml
      - .github/workflows/reusable-build-push-ecr.yml
      - .github/workflows/reusable-ec2-rollout.yml
      - .github/workflows/reusable-security-scan.yml
  pull_request:
    branches: [main, develop]
    paths:
      - packages/backend/**
      - .github/workflows/backend-ci-cd.yml
      - .github/workflows/reusable-build-push-ecr.yml
      - .github/workflows/reusable-ec2-rollout.yml
      - .github/workflows/reusable-security-scan.yml

permissions:
  contents: read

concurrency:
  group: backend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-safety:
    name: Repository Safety Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block tracked .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.|/)'; then
            echo "Tracked .env file detected. Remove it and use GitHub/AWS secrets management."
            exit 1
          fi

      - name: Block obvious AWS key patterns
        run: |
          if git grep -nE 'AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}' -- .; then
            echo "Potential AWS access key detected in repository files."
            exit 1
          fi

  backend-quality:
    name: Lint Typecheck Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: repository-safety
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/backend/requirements.txt
            packages/backend/requirements-ml.txt

      - name: Install backend dependencies and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ml.txt
          pip install pytest ruff mypy bandit

      - name: Ruff lint
        run: |
          ruff check src tests app

      - name: Mypy type check
        continue-on-error: true
        run: |
          mypy --ignore-missing-imports src app

      - name: Bandit SAST
        continue-on-error: true
        run: |
          bandit -r src app -x tests -ll

      - name: Unit tests
        run: |
          pytest -q tests

      - name: Integration tests
        run: |
          if [ -d tests/integration ]; then
            pytest -q tests/integration
          else
            echo "No integration tests found. Skipping integration stage."
          fi

  backend-docker-build:
    name: Docker Build (Runtime)
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend runtime image
        run: |
          docker build \
            --target runtime \
            -f packages/backend/Dockerfile \
            -t aetherforecast-backend:${{ github.sha }} \
            packages/backend

  backend-summary:
    name: Backend CI Summary
    runs-on: ubuntu-latest
    needs: backend-docker-build
    steps:
      - name: Summary
        run: |
          echo "Backend CI completed successfully."
          echo "mypy and bandit are temporary warning-only checks per risk acceptance window."
