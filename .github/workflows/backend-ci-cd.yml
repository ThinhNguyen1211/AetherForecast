name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - packages/backend/**
      - .github/workflows/backend-ci-cd.yml
      - .github/workflows/reusable-build-push-ecr.yml
      - .github/workflows/reusable-ec2-rollout.yml
      - .github/workflows/reusable-security-scan.yml
  pull_request:
    branches: [main, develop]
    paths:
      - packages/backend/**
      - .github/workflows/backend-ci-cd.yml
      - .github/workflows/reusable-build-push-ecr.yml
      - .github/workflows/reusable-ec2-rollout.yml
      - .github/workflows/reusable-security-scan.yml

permissions:
  contents: read

concurrency:
  group: backend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Repository Secret And Config Scan
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      scan-path: .

  backend-quality:
    name: Lint Typecheck Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/backend/requirements.txt
            packages/backend/requirements-ml.txt

      - name: Install backend dependencies and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ml.txt
          pip install pytest ruff mypy bandit

      - name: Ruff lint
        run: |
          ruff check src tests app

      - name: Mypy type check
        run: |
          mypy --ignore-missing-imports src app

      - name: Bandit SAST
        run: |
          bandit -r src app -x tests -ll

      - name: Unit tests
        run: |
          pytest -q tests

      - name: Integration tests
        run: |
          if [ -d tests/integration ]; then
            pytest -q tests/integration
          else
            echo "No integration tests found. Skipping integration stage."
          fi

  backend-docker-build-scan:
    name: Docker Build And Trivy Image Scan
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend runtime image
        run: |
          docker build \
            --target runtime \
            -f packages/backend/Dockerfile \
            -t aetherforecast-backend:${{ github.sha }} \
            packages/backend

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aetherforecast-backend:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  backend-publish-ecr:
    name: Push Backend Image To ECR (Main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: backend-docker-build-scan
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-build-push-ecr.yml
    with:
      aws-region: ap-southeast-1
      role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
      ecr-repository: aetherforecast/backend
      docker-context: packages/backend
      dockerfile: packages/backend/Dockerfile
      docker-target: runtime
      image-tag: ${{ github.sha }}
      push-latest: true

  training-publish-ecr:
    name: Push Training Image To ECR (Main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: backend-docker-build-scan
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-build-push-ecr.yml
    with:
      aws-region: ap-southeast-1
      role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
      ecr-repository: aetherforecast/training
      docker-context: packages/backend
      dockerfile: packages/backend/Dockerfile
      docker-target: training
      image-tag: ${{ github.sha }}
      push-latest: true

  backend-rollout-ec2:
    name: Rollout Backend On EC2 Via SSM (Main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: backend-publish-ecr
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-ec2-rollout.yml
    with:
      aws-region: ap-southeast-1
      role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
      ec2-instance-id: ${{ vars.BACKEND_EC2_INSTANCE_ID }}
      image-uri: ${{ needs.backend-publish-ecr.outputs.image_uri }}
